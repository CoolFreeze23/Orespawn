modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/CoolFreeze23/Orespawn/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
credits="${mod_credits}"
displayURL="https://github.com/CoolFreeze23/Orespawn"
logoFile="assets/orespawn/textures/entity/logo.png"
description='''
OreSpawn — Just plain fun!

Adds tons of new mobs, ores, tools, armor, weapons, dimensions, and boss fights to Minecraft.
Includes Mobzilla, The King & Queen, Kraken, Mothra, and five custom dimensions
(Utopia, Mining, Village, Chaos, Crystal, Islands) reached via right-clicking the iconic
dimension ants. Features the full Bertha family of oversized melee weapons, Royal Guardian
armor with its signature glide, gemstone armory with 1.7.10-faithful power creep, and
data-driven ore generation across the Overworld.

Originally by TheyCallMeDanger (1.7.10 / 1.8). Ported and modernized for NeoForge 1.21.1.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[mixins]]
config="orespawn.mixins.json"

# ──────────────────────────────────────────────────────────────────────
# Vendored MultiHitBoxLib (de.dertoaster.multihitboxlib).
#
# We ship MultiHitBoxLib's source inside this jar (multi-mod jar) rather
# than as a separate jar dependency. This second [[mods]] entry registers
# it as its own NeoForge mod under the upstream namespace so that:
#   - its MHLibMod constructor (annotated @Mod(Constants.MODID)) fires
#     during FML mod-loading
#   - data files under data/multihitboxlib/* resolve to the right
#     ResourceLocation namespace
#   - downstream code can ModList.isLoaded("multihitboxlib") sanity-check
# Keeping the upstream modId (instead of relocating to "orespawn") avoids
# rewriting every namespace-prefixed resource the library ships.
#
# The mixin config below registers de.dertoaster.multihitboxlib.mixin
# .MHLibPlugin as the plugin gating optional Geckolib/AzureLib mixins on
# mod presence. AzureLib mixins compile (compileOnly dep) but the plugin
# returns false from shouldApplyMixin when AzureLib isn't loaded, so they
# never inject — which is what we want since AzureLib isn't shipped.
# ──────────────────────────────────────────────────────────────────────
[[mods]]
modId="multihitboxlib"
version="1.4.0-vendored"
displayName="MultiHitBoxLib (vendored)"
authors="DerToaster, Meme Man"
credits="Vendored into OreSpawn for advanced Geckolib hitbox support"
displayURL="https://github.com/DerToaster98/MultiHitBoxLib"
description='''
MultiHitBoxLib provides part-entity multi-hitbox support that can be
synchronized to Geckolib (or AzureLib) animation bones in real time.
Vendored from the upstream 1.21-NeoForge branch and shipped inside the
OreSpawn jar to power The Queen (and other future bosses) bone-tracked
hitbox profiles.
'''

[[dependencies.multihitboxlib]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.multihitboxlib]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.multihitboxlib]]
modId="geckolib"
type="optional"
versionRange="[4.5.6,)"
ordering="BEFORE"
side="BOTH"

[[mixins]]
config="multihitboxlib.mixins.json"
