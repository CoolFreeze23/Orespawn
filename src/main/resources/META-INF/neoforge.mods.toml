modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/CoolFreeze23/Orespawn/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
credits="${mod_credits}"
displayURL="https://github.com/CoolFreeze23/Orespawn"
logoFile="assets/orespawn/textures/entity/logo.png"
description='''
OreSpawn — Just plain fun!

Adds tons of new mobs, ores, tools, armor, weapons, dimensions, and boss fights to Minecraft.
Includes Mobzilla, The King & Queen, Kraken, Mothra, and five custom dimensions
(Utopia, Mining, Village, Chaos, Crystal, Islands) reached via right-clicking the iconic
dimension ants. Features the full Bertha family of oversized melee weapons, Royal Guardian
armor with its signature glide, gemstone armory with 1.7.10-faithful power creep, and
data-driven ore generation across the Overworld.

Originally by TheyCallMeDanger (1.7.10 / 1.8). Ported and modernized for NeoForge 1.21.1.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[mixins]]
config="orespawn.mixins.json"

# ──────────────────────────────────────────────────────────────────────
# Vendored MultiHitBoxLib (de.dertoaster.multihitboxlib).
#
# Re-vendored after the previous purge with all AzureLib-touching classes
# stripped at the source level (mixin/azurelib, client/azurelib,
# assetsynch/impl/Alib*, api/alibplus, example/entity/AnjanathALib) so
# the class graph never references mod.azure.* — the original
# NoClassDefFoundError that triggered the purge can no longer occur.
#
# This second [[mods]] entry registers MHL under its upstream namespace
# so its @Mod constructor fires, ResourceLocation lookups for
# data/multihitboxlib/* work, and ModList.isLoaded("multihitboxlib")
# returns true for downstream sanity checks (e.g. The Queen's bone-
# tracked hitbox profile loader).
# ──────────────────────────────────────────────────────────────────────
[[mods]]
modId="multihitboxlib"
version="1.4.0-vendored"
displayName="MultiHitBoxLib (vendored)"
authors="DerToaster, OreSpawn Port Team"
credits="Vendored into OreSpawn for The Queen's Geckolib bone-tracked hitboxes (AzureLib surface stripped)."
displayURL="https://github.com/DerToaster98/MultiHitBoxLib"
description='''
MultiHitBoxLib provides part-entity multi-hitbox support that can be
synchronized to Geckolib animation bones in real time. Vendored from
the upstream 1.21-NeoForge branch with the AzureLib integration
removed. Powers The Queen's bone-tracked hitbox profile (see
data/orespawn/multihitboxlib/hitbox_profiles/the_queen.json).
'''

[[dependencies.multihitboxlib]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.multihitboxlib]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.multihitboxlib]]
modId="geckolib"
type="required"
versionRange="[4.7,)"
ordering="BEFORE"
side="BOTH"

[[mixins]]
config="multihitboxlib.mixins.json"
